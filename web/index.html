<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Calidad · Dispositivo médico</title>
<style>
  /* ============ tokens del sistema de diseño ============ */
  :root{
    /* marca */
    --primario:#155EAB; --primario-hover:#1B6DC4; --primario-osc:#0C447C;
    --marino-1:#0C2E52; --marino-2:#0A1F38;
    --azul-tinte:#EEF5FC; --azul-borde:#C9DCF0;
    /* estados (siempre acompañados de texto, nunca color solo) */
    --ok:#12A15A;   --ok-bg:#EAF6EF;   --ok-tx:#086343;
    --no:#D03B3B;   --no-bg:#FDECEC;   --no-tx:#A72525;
    --warn:#E9A23B; --warn-bg:#FCF2DE; --warn-tx:#8A5A08;
    --neutro:#667085; --neutro-bg:#EEF0F3; --neutro-tx:#3F4653;
    /* tinta y superficies */
    --tinta:#16212E; --tinta-2:#5A6472; --tinta-3:#8A93A0;
    --fondo:#F5F6F8; --carta:#FFFFFF; --linea:#E7EAEE; --linea-2:#EEF1F4;
    --sombra:0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
    --sombra-alta:0 12px 32px rgba(13,28,45,.14);
    --radio:14px; --radio-sm:10px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI Variable Text','Segoe UI',system-ui,-apple-system,sans-serif;
       background:var(--fondo); color:var(--tinta); font-size:14px;
       -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;}
  .oculto{display:none !important;}
  svg.ic{width:16px; height:16px; flex-shrink:0; vertical-align:-3px;}
  ::selection{background:var(--azul-tinte);}

  /* ============ LOGIN ============ */
  #login{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
         background:linear-gradient(140deg, var(--marino-2) 0%, var(--marino-1) 45%, #12457C 100%);}
  #login::before{content:''; position:absolute; width:640px; height:640px; border-radius:50%;
         background:radial-gradient(closest-side, rgba(94,158,224,.22), transparent 70%);
         top:-180px; right:-120px; pointer-events:none;}
  .login-card{position:relative; background:var(--carta); border-radius:18px; padding:40px 36px 32px;
              width:380px; box-shadow:0 24px 64px rgba(4,14,26,.45);}
  .login-card .logo{width:52px; height:52px; border-radius:14px; margin:0 auto 16px;
              background:linear-gradient(135deg, var(--primario) 0%, var(--primario-osc) 100%);
              color:#fff; display:flex; align-items:center; justify-content:center;
              box-shadow:0 6px 16px rgba(21,94,171,.35);}
  .login-card .logo svg{width:26px; height:26px;}
  .login-card h1{font-size:19px; font-weight:650; text-align:center; color:var(--tinta); letter-spacing:-.01em;}
  .login-card p{text-align:center; color:var(--tinta-3); font-size:12.5px; margin:4px 0 24px;}
  .login-card label{display:block; font-size:12px; font-weight:550; color:var(--tinta-2); margin:14px 0 6px;}
  .login-card input{width:100%; padding:10px 13px; border:1px solid #D7DDE5; border-radius:var(--radio-sm);
              font-size:14px; background:#FCFDFE; transition:border-color .15s, box-shadow .15s;}
  .login-card input:focus{outline:none; border-color:var(--primario); box-shadow:0 0 0 3px rgba(21,94,171,.14); background:#fff;}
  .btn{background:var(--primario); color:#fff; border:none; border-radius:var(--radio-sm); padding:11px;
       font-size:14px; font-weight:550; cursor:pointer; width:100%; margin-top:24px;
       transition:background .15s, transform .05s; box-shadow:0 1px 2px rgba(12,46,82,.25);}
  .btn:hover{background:var(--primario-hover);}
  .btn:active{transform:translateY(1px);}
  .login-err{color:var(--no-tx); font-size:12.5px; text-align:center; margin-top:12px; min-height:16px;}
  .login-pie{text-align:center; color:var(--tinta-3); font-size:11px; margin-top:18px;}

  /* ============ LAYOUT ============ */
  #app{display:flex; min-height:100vh;}
  .side{width:232px; flex-shrink:0; padding:20px 12px;
        background:linear-gradient(180deg, var(--marino-1) 0%, var(--marino-2) 100%);
        display:flex; flex-direction:column;}
  .side .marca{display:flex; align-items:center; gap:11px; padding:2px 10px 18px;
        border-bottom:1px solid rgba(255,255,255,.10); margin-bottom:14px;}
  .side .marca .icono{width:36px; height:36px; border-radius:10px; flex-shrink:0;
        background:linear-gradient(135deg, #2A78D6 0%, var(--primario-osc) 100%);
        color:#fff; display:flex; align-items:center; justify-content:center;}
  .side .marca .icono svg{width:19px; height:19px;}
  .side .marca b{font-size:14px; font-weight:620; color:#fff; letter-spacing:-.01em; display:block; line-height:1.25;}
  .side .marca span{font-size:11px; color:#8FB0D4; display:block;}
  .nav{display:flex; flex-direction:column; gap:3px;}
  .nav a{display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:var(--radio-sm);
         color:#A9C3E2; text-decoration:none; font-size:13px; font-weight:500; cursor:pointer;
         transition:background .12s, color .12s;}
  .nav a svg.ic{width:17px; height:17px; opacity:.85;}
  .nav a:hover{background:rgba(255,255,255,.07); color:#fff;}
  .nav a.activo{background:rgba(255,255,255,.12); color:#fff; font-weight:600;}
  .side .pie{margin-top:auto; padding:14px 12px 4px; font-size:10.5px; color:#5E7FA3;}

  .main{flex:1; padding:28px 34px; overflow-y:auto; min-width:0;}
  .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:22px;}
  .top h2{font-size:21px; font-weight:650; color:var(--tinta); letter-spacing:-.015em;}
  .top .user{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--tinta-2);
             background:var(--carta); border:1px solid var(--linea); border-radius:999px; padding:6px 14px 6px 7px;
             box-shadow:var(--sombra);}
  .top .user .avatar{width:24px; height:24px; border-radius:50%; background:var(--azul-tinte);
             color:var(--primario); font-size:11px; font-weight:650; display:flex; align-items:center; justify-content:center;}
  .top .user b{font-weight:600; color:var(--tinta);}

  /* ============ CARTAS / KPIs ============ */
  .card{background:var(--carta); border:1px solid var(--linea); border-radius:var(--radio);
        padding:20px 22px; margin-bottom:16px; box-shadow:var(--sombra);}
  .card h3{font-size:14px; font-weight:620; margin-bottom:14px; color:var(--tinta); letter-spacing:-.01em;
        display:flex; align-items:center; gap:8px;}
  .card h3 svg.ic{color:var(--tinta-3);}
  .grid-kpi{display:grid; grid-template-columns:repeat(auto-fit,minmax(148px,1fr)); gap:12px; margin-bottom:16px;}
  .kpi{background:var(--carta); border:1px solid var(--linea); border-radius:var(--radio);
       padding:16px 18px; box-shadow:var(--sombra);}
  .kpi .lbl{font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;
       color:var(--tinta-3); display:flex; align-items:center; gap:6px;}
  .kpi .val{font-size:27px; font-weight:650; margin-top:6px; letter-spacing:-.02em;
       font-variant-numeric:tabular-nums; color:var(--tinta);}
  .kpi.ok .lbl::before, .kpi.no .lbl::before{content:''; width:7px; height:7px; border-radius:50%;}
  .kpi.ok .lbl::before{background:var(--ok);} .kpi.no .lbl::before{background:var(--no);}
  .kpi.ok .val{color:var(--ok-tx);} .kpi.no .val{color:var(--no-tx);} .kpi.az .val{color:var(--primario);}

  /* ============ TABLAS ============ */
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{background:transparent; color:var(--tinta-3); font-weight:600; text-align:left;
     padding:8px 12px; font-size:11px; text-transform:uppercase; letter-spacing:.05em;
     border-bottom:1px solid var(--linea);}
  td{padding:10px 12px; border-bottom:1px solid var(--linea-2); font-variant-numeric:tabular-nums; color:var(--tinta);}
  tr:last-child td{border-bottom:none;}
  .row-link{cursor:pointer; transition:background .1s;}
  .row-link:hover{background:#F7F9FC;}
  .tabla-scroll{overflow-x:auto;}

  /* pills de estado: punto de color + texto (nunca color solo) */
  .pill{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:550;
        padding:3px 10px; border-radius:999px; white-space:nowrap;}
  .pill::before{content:''; width:6px; height:6px; border-radius:50%; flex-shrink:0;}
  .pill.ok{background:var(--ok-bg); color:var(--ok-tx);}     .pill.ok::before{background:var(--ok);}
  .pill.no{background:var(--no-bg); color:var(--no-tx);}     .pill.no::before{background:var(--no);}
  .pill.warn{background:var(--warn-bg); color:var(--warn-tx);} .pill.warn::before{background:var(--warn);}
  .pill.err{background:var(--neutro-bg); color:var(--neutro-tx);} .pill.err::before{background:var(--neutro);}
  .pill.neutral{background:var(--neutro-bg); color:var(--tinta-3);} .pill.neutral::before{background:#B9C0CA;}

  /* ============ MAPA DEL LOTE ============ */
  .mapa{display:flex; flex-wrap:wrap; gap:5px; margin-top:6px;}
  .celda{width:34px; height:34px; border-radius:8px; cursor:pointer; display:flex; align-items:center;
         justify-content:center; font-size:9.5px; font-weight:650; color:#fff;
         overflow:hidden; transition:transform .08s, box-shadow .08s;}
  .celda.ok{background:var(--ok);} .celda.no{background:var(--no);}
  .celda.warn{background:var(--warn);} .celda.err{background:#5A6472;}
  .celda:hover{transform:scale(1.12); box-shadow:0 0 0 2px #fff, 0 0 0 4px var(--primario); z-index:1;}
  .leyenda{display:flex; gap:18px; margin-top:12px; font-size:11.5px; color:var(--tinta-2);}
  .leyenda span{display:flex; align-items:center; gap:6px;}
  .leyenda i{width:11px; height:11px; border-radius:3px; display:inline-block;}

  /* ============ MODAL ============ */
  .modal-bg{position:fixed; inset:0; background:rgba(13,28,45,.45); backdrop-filter:blur(3px);
            display:flex; align-items:flex-start; justify-content:center; padding:48px 16px; z-index:50; overflow-y:auto;}
  .modal-box{background:var(--carta); border-radius:16px; padding:24px 26px; width:min(780px,100%);
             box-shadow:0 24px 64px rgba(6,16,28,.35); position:relative;}
  .modal-x{position:absolute; top:14px; right:14px; border:none; background:var(--fondo); width:30px; height:30px;
           border-radius:8px; font-size:15px; color:var(--tinta-2); cursor:pointer; line-height:1; transition:background .12s, color .12s;}
  .modal-x:hover{background:var(--no-bg); color:var(--no-tx);}

  /* ============ FORMULARIOS / BOTONES ============ */
  label.f{display:block; font-size:12px; font-weight:550; color:var(--tinta-2); margin:8px 0 5px;}
  input.f, select.f{padding:9px 12px; border:1px solid #D7DDE5; border-radius:var(--radio-sm); font-size:13px;
           width:100%; background:#FCFDFE; color:var(--tinta); transition:border-color .15s, box-shadow .15s;}
  input.f:focus, select.f:focus{outline:none; border-color:var(--primario); box-shadow:0 0 0 3px rgba(21,94,171,.14); background:#fff;}
  .btn-sm{display:inline-flex; align-items:center; gap:7px; background:var(--primario); color:#fff; border:none;
          border-radius:var(--radio-sm); padding:9px 16px; font-size:13px; font-weight:550; cursor:pointer;
          box-shadow:0 1px 2px rgba(12,46,82,.25); transition:background .15s, transform .05s;}
  .btn-sm:hover{background:var(--primario-hover);} .btn-sm:active{transform:translateY(1px);}
  .btn-out{display:inline-flex; align-items:center; gap:7px; background:var(--carta); color:#344054;
           border:1px solid #D7DDE5; border-radius:var(--radio-sm); padding:9px 15px; font-size:13px; font-weight:500;
           cursor:pointer; box-shadow:var(--sombra); transition:background .12s, border-color .12s;}
  .btn-out:hover{background:#F7F9FC; border-color:#C3CCD6;}
  .btn-danger{display:inline-flex; align-items:center; gap:7px; background:var(--carta); color:var(--no-tx);
              border:1px solid #F1C4C4; border-radius:var(--radio-sm); padding:9px 15px; font-size:13px; font-weight:500;
              cursor:pointer; transition:background .12s;}
  .btn-danger:hover{background:var(--no-bg);}
  .fila{display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap;}

  /* zona de carga */
  .drop{border:1.5px dashed var(--azul-borde); border-radius:var(--radio); padding:30px 24px; text-align:center;
        color:var(--tinta-3); background:linear-gradient(180deg, #FAFCFE 0%, var(--azul-tinte) 100%); margin-bottom:16px;}
  .drop .drop-ic{width:44px; height:44px; border-radius:12px; background:#fff; border:1px solid var(--azul-borde);
        color:var(--primario); display:flex; align-items:center; justify-content:center; margin:0 auto 10px;
        box-shadow:var(--sombra);}
  .drop .drop-ic svg{width:22px; height:22px;}
  .drop b{color:var(--tinta); display:block; font-size:14.5px; font-weight:620; margin-bottom:2px;}
  .mini{font-size:11.5px; color:var(--tinta-3);}

  /* barras (Pareto) */
  .barra{height:10px; border-radius:4px; background:#2A78D6; min-width:3px;}

  /* ============ TARJETAS DE LOTE (dashboard) ============ */
  .mapa-lotes{display:grid; grid-template-columns:repeat(auto-fill,minmax(168px,1fr)); gap:12px; margin-top:6px;}
  .lote-card{background:var(--carta); border:1px solid var(--linea); border-radius:var(--radio);
             padding:14px 16px; cursor:pointer; display:flex; flex-direction:column; gap:4px;
             box-shadow:var(--sombra); transition:transform .08s, box-shadow .12s, border-color .12s;}
  .lote-card:hover{transform:translateY(-2px); box-shadow:var(--sombra-alta); border-color:#C9D4E0;}
  .lote-card .lc-nom{font-size:12.5px; font-weight:600; color:var(--tinta); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .lote-card .lc-pct{font-size:24px; font-weight:660; line-height:1.15; letter-spacing:-.02em; font-variant-numeric:tabular-nums;}
  .lote-card.ok .lc-pct{color:var(--ok-tx);} .lote-card.warn .lc-pct{color:var(--warn-tx);} .lote-card.no .lc-pct{color:var(--no-tx);}
  .lote-card .lc-bar{height:5px; border-radius:999px; background:var(--linea-2); overflow:hidden; margin:3px 0 2px;}
  .lote-card .lc-bar i{display:block; height:100%; border-radius:999px;}
  .lote-card.ok .lc-bar i{background:var(--ok);} .lote-card.warn .lc-bar i{background:var(--warn);} .lote-card.no .lc-bar i{background:var(--no);}
  .lote-card .lc-mini{font-size:11px; color:var(--tinta-3);}

  /* ============ BANDAS DE LÍMITE (gráfica de un desechable) ============ */
  .banda-row{display:flex; align-items:center; gap:10px; margin:5px 0;}
  .banda-track{position:relative; flex:1; height:14px; border-radius:999px; background:var(--linea-2);}
  .banda-ok{position:absolute; inset:0; border-radius:999px; background:var(--ok-bg); border:1px solid #BFE3CF;}
  .banda-vacia{background:repeating-linear-gradient(45deg,#F3F4F6,#F3F4F6 5px,#EBEDF0 5px,#EBEDF0 10px);}
  .banda-dot{position:absolute; top:50%; width:13px; height:13px; border-radius:50%;
             transform:translate(-50%,-50%); border:2.5px solid #fff; box-shadow:0 1px 3px rgba(16,24,40,.3);}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="login-card">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
    </div>
    <h1>Control de Calidad</h1>
    <p>Liberación de desechables · Dispositivo médico</p>
    <label>Usuario</label>
    <input id="lg-user" type="text" value="admin" autocomplete="off">
    <label>Contraseña</label>
    <input id="lg-pass" type="password" placeholder="Ingresa tu contraseña">
    <button class="btn" onclick="login()">Iniciar sesión</button>
    <div id="lg-err" class="login-err"></div>
    <div class="login-pie">Sistema local · Los datos no salen de este equipo</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="oculto">
  <div class="side">
    <div class="marca">
      <div class="icono">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
      </div>
      <div><b>Calidad QC</b><span>Dispositivo médico</span></div>
    </div>
    <div class="nav">
      <a data-v="procesar" class="activo" onclick="ir('procesar')">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
        Procesar corrida</a>
      <a data-v="limites" onclick="ir('limites')">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
        Estándar de calidad</a>
      <a data-v="dashboard" onclick="ir('dashboard')">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Dashboard</a>
      <a data-v="historial" onclick="ir('historial')">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Historial de lotes</a>
    </div>
    <div class="pie">v1 · Uso interno</div>
  </div>

  <div class="main">
    <div class="top">
      <h2 id="titulo">Procesar corrida</h2>
      <div class="user"><span class="avatar">A</span>Sesión <b id="who">admin</b></div>
    </div>
    <div id="vistas"></div>
  </div>
</div>

<!-- ===== MODAL DE DETALLE DE PIEZA ===== -->
<div id="modal" class="modal-bg oculto" onclick="if(event.target===this)cerrarModal()">
  <div class="modal-box">
    <button class="modal-x" onclick="cerrarModal()" title="Cerrar">✕</button>
    <div id="modal-cont"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
