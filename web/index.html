<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Calidad — Dispositivo médico</title>
<style>
  :root{
    --azul:#0C447C; --azul2:#185FA5; --azul-cl:#E6F1FB; --azul-bd:#B5D4F4;
    --verde:#1D9E75; --verde-bg:#E1F5EE; --verde-tx:#0F6E56;
    --rojo:#E24B4A; --rojo-bg:#FCEBEB; --rojo-tx:#A32D2D;
    --gris:#5F5E5A; --gris-cl:#888780; --linea:#E2E2DD; --fondo:#F6F7F9; --blanco:#fff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif; background:var(--fondo); color:#1c1c1a; font-size:14px;}
  .oculto{display:none !important;}

  /* LOGIN */
  #login{position:fixed; inset:0; background:var(--azul); display:flex; align-items:center; justify-content:center;}
  .login-card{background:#fff; border-radius:14px; padding:36px 32px; width:340px; box-shadow:0 10px 40px rgba(0,0,0,.25);}
  .login-card .logo{width:54px; height:54px; border-radius:12px; background:var(--azul); color:#fff; display:flex; align-items:center; justify-content:center; font-size:24px; margin:0 auto 14px;}
  .login-card h1{font-size:18px; font-weight:600; text-align:center; color:var(--azul); margin-bottom:4px;}
  .login-card p{text-align:center; color:var(--gris-cl); font-size:12px; margin-bottom:20px;}
  .login-card label{display:block; font-size:12px; color:var(--gris); margin:10px 0 4px;}
  .login-card input{width:100%; padding:10px 12px; border:1px solid var(--linea); border-radius:8px; font-size:14px;}
  .login-card input:focus{outline:none; border-color:var(--azul2);}
  .btn{background:var(--azul); color:#fff; border:none; border-radius:8px; padding:11px; font-size:14px; font-weight:500; cursor:pointer; width:100%; margin-top:18px;}
  .btn:hover{background:var(--azul2);}
  .login-err{color:var(--rojo-tx); font-size:12px; text-align:center; margin-top:10px;}

  /* LAYOUT */
  #app{display:flex; min-height:100vh;}
  .side{width:210px; background:var(--azul); color:#fff; flex-shrink:0; padding:18px 0;}
  .side .marca{display:flex; align-items:center; gap:10px; padding:0 18px 18px; border-bottom:1px solid rgba(255,255,255,.15); margin-bottom:10px;}
  .side .marca .ic{width:34px; height:34px; background:#fff; color:var(--azul); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px;}
  .side .marca b{font-size:14px; font-weight:600;} .side .marca span{font-size:11px; color:var(--azul-bd); display:block;}
  .nav a{display:flex; align-items:center; gap:10px; padding:11px 18px; color:var(--azul-bd); text-decoration:none; font-size:13px; cursor:pointer;}
  .nav a.activo, .nav a:hover{background:rgba(255,255,255,.12); color:#fff;}
  .main{flex:1; padding:26px 30px; overflow-y:auto;}
  .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:22px;}
  .top h2{font-size:20px; font-weight:600; color:var(--azul);}
  .top .user{font-size:12px; color:var(--gris-cl);}

  .card{background:#fff; border:1px solid var(--linea); border-radius:12px; padding:18px 20px; margin-bottom:16px;}
  .card h3{font-size:14px; font-weight:600; margin-bottom:12px; color:var(--azul);}
  .grid-kpi{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px;}
  .kpi{background:#fff; border:1px solid var(--linea); border-radius:12px; padding:14px 16px;}
  .kpi .lbl{font-size:12px; color:var(--gris-cl);} .kpi .val{font-size:26px; font-weight:600; margin-top:2px;}
  .kpi.ok .val{color:var(--verde);} .kpi.no .val{color:var(--rojo);} .kpi.az .val{color:var(--azul);}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{background:var(--azul); color:#fff; font-weight:500; text-align:left; padding:8px 10px; font-size:12px;}
  td{padding:8px 10px; border-bottom:1px solid var(--linea);}
  tr:last-child td{border-bottom:none;}
  .pill{font-size:11px; padding:3px 9px; border-radius:6px; font-weight:500;}
  .pill.ok{background:var(--verde-bg); color:var(--verde-tx);}
  .pill.no{background:var(--rojo-bg); color:var(--rojo-tx);}
  .pill.warn{background:#FFF2CC; color:#9C6500;}
  .pill.err{background:#3A3A3A; color:#fff;}

  /* MAPA DEL LOTE */
  .mapa{display:flex; flex-wrap:wrap; gap:4px; margin-top:6px;}
  .celda{width:32px; height:32px; border-radius:5px; cursor:pointer; display:flex; align-items:center;
         justify-content:center; font-size:9px; font-weight:600; color:rgba(255,255,255,.9);
         overflow:hidden; transition:transform .05s;}
  .celda.ok{background:var(--verde);}
  .celda.no{background:var(--rojo);}
  .celda.warn{background:#E0A800;}
  .celda.err{background:#3A3A3A;}
  .celda:hover{transform:scale(1.15); outline:2px solid var(--azul); z-index:1;}
  .leyenda{display:flex; gap:16px; margin-top:10px; font-size:11px; color:var(--gris);}
  .leyenda span{display:flex; align-items:center; gap:5px;}
  .leyenda i{width:12px; height:12px; border-radius:3px; display:inline-block;}
  .tabla-scroll{overflow-x:auto;}

  /* MODAL DETALLE */
  .modal-bg{position:fixed; inset:0; background:rgba(12,30,50,.55); display:flex; align-items:flex-start;
            justify-content:center; padding:40px 16px; z-index:50; overflow-y:auto;}
  .modal-box{background:#fff; border-radius:12px; padding:22px 24px; width:min(760px,100%);
             box-shadow:0 20px 60px rgba(0,0,0,.3); position:relative;}
  .modal-x{position:absolute; top:12px; right:14px; border:none; background:none; font-size:18px;
           color:var(--gris-cl); cursor:pointer; line-height:1;}
  .modal-x:hover{color:var(--rojo-tx);}

  label.f{display:block; font-size:12px; color:var(--gris); margin:8px 0 4px;}
  input.f, select.f{padding:9px 11px; border:1px solid var(--linea); border-radius:8px; font-size:13px; width:100%;}
  input.f:focus, select.f:focus{outline:none; border-color:var(--azul2);}
  .btn-sm{background:var(--azul); color:#fff; border:none; border-radius:8px; padding:9px 16px; font-size:13px; font-weight:500; cursor:pointer;}
  .btn-sm:hover{background:var(--azul2);}
  .btn-out{background:#fff; color:var(--azul); border:1px solid var(--azul-bd); border-radius:8px; padding:9px 16px; font-size:13px; cursor:pointer;}
  .btn-out:hover{background:var(--azul-cl);}
  .fila{display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;}
  .drop{border:2px dashed var(--azul-bd); border-radius:12px; padding:26px; text-align:center; color:var(--gris-cl); background:var(--azul-cl); cursor:pointer; margin-bottom:14px;}
  .drop b{color:var(--azul); display:block; margin-top:6px; font-size:14px;}
  .est-box{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .est-box .sub{border:1px solid var(--linea); border-radius:10px; padding:14px;}
  .est-box .sub h4{font-size:13px; color:var(--azul); margin-bottom:10px; display:flex; align-items:center; gap:6px;}
  .mini{font-size:11px; color:var(--gris-cl);}
  .barra{height:11px; border-radius:4px; background:var(--azul2);}
  .row-link{cursor:pointer;} .row-link:hover{background:var(--azul-cl);}

  /* TARJETAS DE LOTE (dashboard) */
  .mapa-lotes{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-top:6px;}
  .lote-card{border-radius:10px; padding:12px 14px; cursor:pointer; color:#fff; transition:transform .06s;
             display:flex; flex-direction:column; gap:2px; border:2px solid transparent;}
  .lote-card:hover{transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.18);}
  .lote-card.ok{background:var(--verde);}
  .lote-card.warn{background:#E0A800;}
  .lote-card.no{background:var(--rojo);}
  .lote-card .lc-nom{font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .lote-card .lc-pct{font-size:24px; font-weight:700; line-height:1;}
  .lote-card .lc-mini{font-size:11px; color:rgba(255,255,255,.85);}

  /* BOTON DE PELIGRO (eliminar) */
  .btn-danger{background:#fff; color:var(--rojo-tx); border:1px solid var(--rojo); border-radius:8px;
              padding:9px 16px; font-size:13px; cursor:pointer;}
  .btn-danger:hover{background:var(--rojo-bg);}

  /* BANDAS DE LIMITE (gráfica de un desechable) */
  .banda-row{display:flex; align-items:center; gap:8px; margin:3px 0;}
  .banda-track{position:relative; flex:1; height:14px; border-radius:7px; background:#F0F0EC;}
  .banda-ok{position:absolute; inset:0; border-radius:7px; background:var(--verde-bg); border:1px solid var(--verde);}
  .banda-vacia{background:repeating-linear-gradient(45deg,#f4f4f0,#f4f4f0 4px,#e8e8e2 4px,#e8e8e2 8px);}
  .banda-dot{position:absolute; top:50%; width:12px; height:12px; border-radius:50%;
             transform:translate(-50%,-50%); border:2px solid #fff; box-shadow:0 0 3px rgba(0,0,0,.3);}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="login-card">
    <div class="logo">✚</div>
    <h1>Control de Calidad</h1>
    <p>Liberación de desechables · Dispositivo médico</p>
    <label>Usuario</label>
    <input id="lg-user" type="text" value="admin" autocomplete="off">
    <label>Contraseña</label>
    <input id="lg-pass" type="password" placeholder="••••">
    <button class="btn" onclick="login()">Entrar</button>
    <div id="lg-err" class="login-err"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="oculto">
  <div class="side">
    <div class="marca"><div class="ic">✚</div><div><b>Calidad QC</b><span>Dispositivo médico</span></div></div>
    <div class="nav">
      <a data-v="procesar" class="activo" onclick="ir('procesar')">▶ Procesar corrida</a>
      <a data-v="limites" onclick="ir('limites')">⚙ Estándar de calidad</a>
      <a data-v="dashboard" onclick="ir('dashboard')">📊 Dashboard</a>
      <a data-v="historial" onclick="ir('historial')">🗂 Historial de lotes</a>
    </div>
  </div>

  <div class="main">
    <div class="top">
      <h2 id="titulo">Procesar corrida</h2>
      <div class="user">Sesión: <b id="who">admin</b></div>
    </div>
    <div id="vistas"></div>
  </div>
</div>

<!-- ===== MODAL DE DETALLE DE PIEZA ===== -->
<div id="modal" class="modal-bg oculto" onclick="if(event.target===this)cerrarModal()">
  <div class="modal-box">
    <button class="modal-x" onclick="cerrarModal()" title="Cerrar">✕</button>
    <div id="modal-cont"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
